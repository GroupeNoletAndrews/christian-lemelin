# Three services: db (Postgres) -> backend (NestJS + Prisma) -> frontend (Next.js).
# Run from WSL in the repo dir:  docker compose up --build
# Values come from a local .env (see .env.example); defaults below are dev-safe.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Dev convenience: accept any localhost port (e.g. `next dev` hot-reload).
      CORS_ALLOW_LOCALHOST: "true"
      UPLOADS_DIR: /app/uploads
      JSON_BODY_LIMIT: 25mb
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-password}
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # The API only starts listening after migrations + seed, so a 200 here
      # means the backend is fully ready.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  frontend:
    build:
      context: .
      args:
        # Baked into the browser bundle — must be reachable from the host browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
