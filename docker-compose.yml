# Three services: db (Postgres) -> backend (NestJS + Prisma) -> frontend (Next.js).
# Run from WSL in the repo dir:  docker compose up --build
# Values come from a local .env (see .env.example); defaults below are dev-safe.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    # Backend app config (JWT_*, CORS_ORIGIN, SEED_*, RESEND_*, MAIL_*, PORT,
    # JSON_BODY_LIMIT) has its single source of truth in backend/.env — loaded
    # into the container from there. The backend code also ships dev-safe
    # fallbacks, so a missing backend/.env still boots in dev (required: false).
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Only values that MUST differ INSIDE the container go here; these OVERRIDE
      # anything coming from env_file above:
      #   • Postgres host is the `db` service, not localhost.
      #   • uploads is a mounted volume at a container path.
      #   • CORS: in dev, also accept any localhost port (Next hot-reload).
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
      UPLOADS_DIR: /app/uploads
      CORS_ALLOW_LOCALHOST: "true"
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # The API only starts listening after migrations + seed, so a 200 here
      # means the backend is fully ready.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the browser bundle — must be reachable from the host browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # Dev-only web DB client at http://localhost:8080
  # (login — System: PostgreSQL, Server: db, Username/Password/Database: app/app/app).
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
