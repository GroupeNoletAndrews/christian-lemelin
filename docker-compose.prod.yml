# Production-style stack: backend + frontend ONLY. The database is Supabase
# (managed Postgres) — there is no local `db` service here.
#
# Usage:
#   cp .env.prod.example .env.prod   # fill in real values
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d
#
# The `${VAR:?...}` entries fail fast if a required secret is missing.

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Supabase connection string (include ?sslmode=require). See .env.prod.example.
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL to your Supabase connection string}
      JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: "3001"
      # Comma-separated public origin(s) of the deployed frontend (strict in prod).
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN to your frontend URL}
      UPLOADS_DIR: /app/uploads
      JSON_BODY_LIMIT: 25mb
      # Admin login is seeded; demo jobs/réalisations are NOT seeded in prod.
      SEED_DEMO_DATA: "false"
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set a strong SEED_ADMIN_PASSWORD}
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      args:
        # Baked into the browser bundle — the PUBLIC URL the browser uses to reach the API.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL to your public backend URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads:
